<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapWar - Final Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --green: #f2eee4;
            --green-dim: #c8beab;
            --bg-dark: #12110f;
            --bg-panel: rgba(24, 22, 19, 0.93);
            --border: #9f957f;
            --text: #e2dacb;
            --red: #ff3333;
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.06) 2px,
                rgba(0,0,0,0.06) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        #header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 48px;
            background: linear-gradient(90deg, #0b0a09 0%, #171512 50%, #0b0a09 100%);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 2000;
        }

        #header h1 {
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 4px;
            color: var(--green);
            text-shadow: 0 0 10px var(--green);
            text-transform: uppercase;
        }

        #header-right {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 11px;
            color: var(--green-dim);
            letter-spacing: 1px;
        }

        #news-ticker {
            position: fixed;
            top: 48px;
            left: 0;
            right: 0;
            overflow: hidden;
            height: 28px;
            border-top: 1px solid rgba(159, 149, 127, 0.55);
            border-bottom: 1px solid rgba(159, 149, 127, 0.55);
            background: rgba(24, 22, 19, 0.85);
            display: flex;
            align-items: center;
            z-index: 1900;
        }

        #news-ticker-track {
            display: inline-flex;
            align-items: center;
            gap: 64px;
            white-space: nowrap;
            color: #ff4d4d;
            font-size: 11px;
            letter-spacing: 1.2px;
            text-shadow: 0 0 8px rgba(255, 77, 77, 0.35);
            will-change: transform;
            animation: ticker-scroll 22s linear infinite;
        }

        #news-ticker-track::after {
            content: attr(data-text);
        }

        @keyframes ticker-scroll {
            from { transform: translateX(0); }
            to { transform: translateX(calc(-50% - 32px)); }
        }

        #map-freshness {
            color: var(--green-dim);
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #clock {
            color: var(--green);
            font-size: 13px;
            letter-spacing: 2px;
            text-shadow: 0 0 6px var(--green);
        }

        #map {
            position: fixed;
            top: 76px; left: 0; right: 0; bottom: 32px;
            z-index: 1;
        }

        #statusbar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 32px;
            background: linear-gradient(90deg, #0b0a09 0%, #171512 50%, #0b0a09 100%);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 2000;
            font-size: 11px;
            color: var(--green-dim);
            letter-spacing: 1px;
        }

        #coords-display { color: var(--green); font-size: 12px; }
        #load-status { color: var(--green); }
        #load-status.error { color: var(--red); }

        .leaflet-control-zoom a {
            background: var(--bg-panel) !important;
            border-bottom-color: var(--border) !important;
            color: var(--green) !important;
        }
        .leaflet-control-zoom a:hover { background: rgba(242,238,228,0.14) !important; }

        .leaflet-bar { border: 1px solid var(--border) !important; box-shadow: none !important; }
        .leaflet-bar a { border-bottom: 1px solid var(--border) !important; }

        .leaflet-popup-content-wrapper {
            background: var(--bg-panel) !important;
            border: 1px solid var(--border) !important;
            color: var(--text) !important;
            border-radius: 0 !important;
            box-shadow: 0 0 12px rgba(242,238,228,0.12) !important;
        }
        .leaflet-popup-tip { background: var(--border) !important; }

        .leaflet-control-attribution {
            background: rgba(24,22,19,0.75) !important;
            color: var(--green-dim) !important;
            font-size: 9px !important;
        }
        .leaflet-control-attribution a { color: var(--green) !important; }

        .mw-circle-image-fill {
            clip-path: circle(50% at 50% 50%);
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>
<header id="header">
    <h1>GEOGRAPHIC SATELLITE - VIEW</h1>
    <div id="header-right">
        <span id="map-freshness">Latest map update: April 1, 2026</span>
        <span id="clock">00:00:00Z</span>
    </div>
</header>

<div id="news-ticker" aria-label="News ticker">
    <span id="news-ticker-track">Loading news bulletin...</span>
</div>

<div id="map"></div>

<div id="statusbar">
    <span id="coords-display">LAT: - | LNG: - | ZOOM: -</span>
    <span id="load-status">Loading map data...</span>
    <span></span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

<script>
const darkTile = L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',
    {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20
    }
);

const map = L.map('map', {
    center: [25, 15],
    zoom: 3,
    attributionControl: false,
    zoomControl: false,
    layers: [darkTile]
});
L.control.zoom({ position: 'bottomright' }).addTo(map);

map.createPane('circleImagePane');
map.getPane('circleImagePane').style.zIndex = 650;
map.getPane('circleImagePane').style.pointerEvents = 'none';

const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);
const circleImageOverlays = new Map(); // key -> { circleLayer, overlay }

let countryPaintLayer = null;
let provincePaintLayer = null;

const COUNTRIES_GEOJSON_URL = 'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson';
const PROVINCES_GEOJSON_URL = 'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_10m_admin_1_states_provinces.geojson';
const NEWS_JSON_URL = 'news.json';
const TYPE_COLORS = {
    border: '#ff3333',
    zone: '#ffd700',
    route: '#d8d0bf',
    fortification: '#ff8c00',
    marker: '#00ffff',
    other: '#d4ccbc'
};

function normalizeCountryName(name) {
    return String(name || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-zA-Z0-9 ]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .toUpperCase();
}

function getCountryKey(feature) {
    const props = feature && feature.properties ? feature.properties : {};
    return normalizeCountryName([
        props['ISO3166-1-Alpha-3'],
        props['ISO3166-1-Alpha-2'],
        props.iso_a3,
        props.iso_a2,
        props.name,
        props.NAME,
        props.ADMIN
    ].filter(Boolean).join('|'));
}

function getProvinceKey(feature) {
    const props = feature && feature.properties ? feature.properties : {};
    return normalizeCountryName([
        props.adm1_code,
        props.iso_3166_2,
        props.name_en,
        props.name,
        props.adm0_name,
        props.admin,
        props.adm0_a3
    ].filter(Boolean).join('|'));
}

function countryHiddenStyle() {
    return {
        color: '#000000',
        weight: 0,
        opacity: 0,
        fill: true,
        fillColor: '#000000',
        fillOpacity: 0
    };
}

function provinceHiddenStyle() {
    return {
        color: '#000000',
        weight: 0,
        opacity: 0,
        fill: true,
        fillColor: '#000000',
        fillOpacity: 0
    };
}

function countryPaintedStyle(color) {
    return {
        color: color,
        weight: 0,
        opacity: 1,
        fill: true,
        fillColor: color,
        fillOpacity: 0.45
    };
}

function provincePaintedStyle(color) {
    return {
        color: color,
        weight: 0,
        opacity: 1,
        fill: true,
        fillColor: color,
        fillOpacity: 0.45
    };
}

function shapeOpts(color) {
    return { color: color, weight: 2.5, fill: true, fillColor: color, fillOpacity: 0.55 };
}

function militaryIcon() {
    return L.divIcon({
        className: '',
        html: '<div style="width:12px;height:12px;background:#f2eee4;border:2px solid #12110f;transform:rotate(45deg);box-shadow:0 0 6px rgba(242,238,228,0.65)"></div>',
        iconSize: [12, 12],
        iconAnchor: [6, 6],
        popupAnchor: [0, -8]
    });
}

function makePopupHTML(name, type, color) {
    const popupColor = color || '#e2dacb';
    return '<b style="color:' + popupColor + ';font-size:13px">' + escapeHTML(name) + '</b>' +
        '<br><span style="font-size:10px;color:#e2dacb;letter-spacing:2px">' + String(type || 'other').toUpperCase() + '</span>';
}

function escapeHTML(str) {
    return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

function getCircleImageBounds(circle) {
    const center = circle.getLatLng();
    const b = circle.getBounds();
    const cPt = map.latLngToLayerPoint(center);
    const nPt = map.latLngToLayerPoint(L.latLng(b.getNorth(), center.lng));
    const ePt = map.latLngToLayerPoint(L.latLng(center.lat, b.getEast()));
    const radiusY = Math.max(1, Math.abs(cPt.y - nPt.y));
    const radiusX = Math.max(1, Math.abs(ePt.x - cPt.x));
    const radius = Math.min(radiusX, radiusY);
    const w = radius * 2;
    const h = radius * 2;
    const nwPt = L.point(cPt.x - (w / 2), cPt.y - (h / 2));
    const sePt = L.point(cPt.x + (w / 2), cPt.y + (h / 2));
    return L.latLngBounds(map.layerPointToLatLng(nwPt), map.layerPointToLatLng(sePt));
}

function getCircleOverlayKey(circleLayer) {
    return String(L.Util.stamp(circleLayer));
}

function refreshCircleImageOverlay(circleLayer) {
    if (!circleLayer || !(circleLayer instanceof L.Circle)) return;
    const key = getCircleOverlayKey(circleLayer);
    const item = circleImageOverlays.get(key);
    if (!item || !item.overlay) return;
    item.overlay.setBounds(getCircleImageBounds(circleLayer));
}

function refreshAllCircleImageOverlays() {
    circleImageOverlays.forEach(function (item) {
        if (!item || !item.circleLayer || !item.overlay) return;
        item.overlay.setBounds(getCircleImageBounds(item.circleLayer));
    });
}

function attachImageToCircle(circleLayer, imageData) {
    const key = getCircleOverlayKey(circleLayer);
    const existing = circleImageOverlays.get(key);
    if (existing && existing.overlay) {
        map.removeLayer(existing.overlay);
        circleImageOverlays.delete(key);
    }

    const overlay = L.imageOverlay(imageData, getCircleImageBounds(circleLayer), {
        className: 'mw-circle-image-fill',
        interactive: false,
        pane: 'circleImagePane',
        opacity: 1
    });
    overlay.addTo(map);
    if (overlay.bringToFront) overlay.bringToFront();
    circleImageOverlays.set(key, { circleLayer: circleLayer, overlay: overlay });
    refreshCircleImageOverlay(circleLayer);
    circleLayer.setStyle({ fillOpacity: 0 });
}

function applyLoadedLayerStyle(layer, color) {
    if (!layer || typeof layer.setStyle !== 'function') return;
    if (layer instanceof L.Polyline && !(layer instanceof L.Polygon)) {
        layer.setStyle({ color: color, weight: 2.5, opacity: 1, fill: false });
        return;
    }
    layer.setStyle(shapeOpts(color));
}

function bringDrawnItemsToFront() {
    drawnItems.eachLayer(function (layer) {
        if (layer && typeof layer.bringToFront === 'function') {
            layer.bringToFront();
        }
    });
}

map.on('zoomend moveend resize', function () {
    refreshAllCircleImageOverlays();
});

async function renderCountryPaint(countryPaint) {
    if (!countryPaint || Object.keys(countryPaint).length === 0) return;

    const res = await fetch(COUNTRIES_GEOJSON_URL);
    if (!res.ok) return;
    const data = await res.json();

    countryPaintLayer = L.geoJSON(data, {
        style: function (feature) {
            const key = getCountryKey(feature);
            if (countryPaint[key]) {
                return countryPaintedStyle(countryPaint[key]);
            }
            return countryHiddenStyle();
        }
    }).addTo(map);
}

async function renderProvincePaint(provincePaint) {
    if (!provincePaint || Object.keys(provincePaint).length === 0) return;

    const res = await fetch(PROVINCES_GEOJSON_URL);
    if (!res.ok) return;
    const data = await res.json();

    provincePaintLayer = L.geoJSON(data, {
        style: function (feature) {
            const key = getProvinceKey(feature);
            if (provincePaint[key]) {
                return provincePaintedStyle(provincePaint[key]);
            }
            return provinceHiddenStyle();
        }
    }).addTo(map);
}

function getDataFileFromQuery() {
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');
    if (!file) return 'data/map-data.json';
    return file.startsWith('data/') ? file : ('data/' + file);
}

async function loadNewsTicker() {
    const ticker = document.getElementById('news-ticker-track');
    if (!ticker) return;

    try {
        const res = await fetch(NEWS_JSON_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error('Could not load news.json');
        const data = await res.json();
        const items = Array.isArray(data.items)
            ? data.items.filter(function (item) {
                return typeof item === 'string' && item.trim().length > 0;
            }).map(function (item) {
                return item.trim();
            })
            : [];
        const text = typeof data.text === 'string' ? data.text.trim() : '';
        const paddedItems = items.map(function (item) {
            return '   ' + item + '   ';
        });
        ticker.textContent = paddedItems.length > 0 ? paddedItems.join(' | ') : (text || 'No active news bulletin.');
        ticker.setAttribute('data-text', ticker.textContent);
    } catch (err) {
        ticker.textContent = 'News feed unavailable.';
        ticker.setAttribute('data-text', ticker.textContent);
    }
}

async function loadFinalMap() {
    const dataFile = getDataFileFromQuery();

    try {
        const res = await fetch(dataFile, { cache: 'no-store' });
        if (!res.ok) throw new Error('Could not load ' + dataFile);
        const geojson = await res.json();

        L.geoJSON(geojson, {
            style: function (feature) {
                const props = feature.properties || {};
                const type = props.type || 'other';
                const color = props.color || TYPE_COLORS[type] || TYPE_COLORS.other;
                if (feature && feature.geometry && feature.geometry.type === 'LineString') {
                    return { color: color, weight: 2.5, opacity: 1, fill: false };
                }
                return shapeOpts(color);
            },
            pointToLayer: function (feature, latlng) {
                const props = feature.properties || {};
                if (props.radius) {
                    return L.circle(latlng, {
                        radius: props.radius,
                        color: props.color || '#d4ccbc',
                        weight: 2.5,
                        fill: true,
                        fillColor: props.color || '#d4ccbc',
                        fillOpacity: 0.55
                    });
                }
                return L.marker(latlng, { icon: militaryIcon() });
            },
            onEachFeature: function (feature, layer) {
                drawnItems.addLayer(layer);
                const props = feature.properties || {};
                const name = props.name || 'Imported';
                const type = props.type || 'other';
                const color = props.color || TYPE_COLORS[type] || TYPE_COLORS.other;

                applyLoadedLayerStyle(layer, color);

                layer.bindPopup(makePopupHTML(name, type, color));

                if (layer instanceof L.Circle && props.imageData) {
                    attachImageToCircle(layer, props.imageData);
                }
            }
        });

        await renderCountryPaint(geojson.countryPaint || {});
        await renderProvincePaint(geojson.provincePaint || {});
        bringDrawnItemsToFront();

        if (drawnItems.getLayers().length > 0) {
            map.fitBounds(drawnItems.getBounds(), { padding: [40, 40] });
        }
        refreshAllCircleImageOverlays();
        bringDrawnItemsToFront();

        const count = drawnItems.getLayers().length;
        document.getElementById('load-status').textContent = 'Loaded successfully: ' + count + ' assets';
    } catch (err) {
        const status = document.getElementById('load-status');
        status.textContent = 'Load error: ' + err.message;
        status.classList.add('error');
    }
}

map.on('mousemove', function (e) {
    const lat = e.latlng.lat.toFixed(5);
    const lng = e.latlng.lng.toFixed(5);
    const zoom = map.getZoom();
    document.getElementById('coords-display').textContent = 'LAT: ' + lat + ' | LNG: ' + lng + ' | ZOOM: ' + zoom;
});

const phtClockFormatter = new Intl.DateTimeFormat('en-GB', {
    timeZone: 'Asia/Manila',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: false
});

function updateClock() {
    document.getElementById('clock').textContent = phtClockFormatter.format(new Date()) + ' PHT';
}
updateClock();
setInterval(updateClock, 1000);

loadNewsTicker();
loadFinalMap();
</script>
</body>
</html>
