<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapWar — Tactical Operations</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <!-- Leaflet.Draw CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

    <style>
        /* ===== RESET ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        /* ===== THEME ===== */
        :root {
            --green:     #39ff14;
            --green-dim: #1f8c09;
            --green-bg:  rgba(57, 255, 20, 0.10);
            --bg-dark:   #060d06;
            --bg-panel:  rgba(6, 13, 6, 0.93);
            --border:    #1f8c09;
            --red:       #ff3333;
            --yellow:    #ffd700;
            --cyan:      #00ffff;
            --text:      #a0d890;
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            width:  100vw;
        }

        /* CRT scan lines overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.06) 2px,
                rgba(0,0,0,0.06) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* ===== HEADER ===== */
        #header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 48px;
            background: linear-gradient(90deg, #000 0%, #0a1a0a 50%, #000 100%);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 2000;
        }

        #header h1 {
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 5px;
            color: var(--green);
            text-shadow: 0 0 10px var(--green);
            text-transform: uppercase;
        }

        #header-right {
            display: flex;
            align-items: center;
            gap: 24px;
            font-size: 11px;
            color: var(--green-dim);
            letter-spacing: 2px;
        }

        #clock {
            color: var(--green);
            font-size: 14px;
            letter-spacing: 2px;
            text-shadow: 0 0 6px var(--green);
        }

        /* ===== MAP ===== */
        #map {
            position: fixed;
            top: 48px; left: 0; right: 0; bottom: 32px;
            z-index: 1;
        }

        /* ===== SHARED PANEL ===== */
        .panel {
            position: fixed;
            z-index: 1000;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            padding: 10px;
        }

        .panel-title {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--green);
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
            margin-bottom: 6px;
        }

        /* ===== LEFT PANEL ===== */
        #left-panel {
            top: 58px;
            left: 10px;
            width: 172px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .btn {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 7px 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            text-align: left;
            transition: background 0.12s, color 0.12s, border-color 0.12s;
        }
        .btn::before { content: '> '; color: var(--green-dim); }
        .btn:hover   { background: var(--green-bg); color: var(--green); border-color: var(--green); }
        .btn:active  { background: rgba(57,255,20,0.22); }

        .btn.danger              { border-color: var(--red); color: #ff9999; }
        .btn.danger::before      { color: var(--red); }
        .btn.danger:hover        { background: rgba(255,51,51,0.15); color: var(--red); border-color: var(--red); }

        .draw-color-wrap {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            border: 1px solid var(--border);
            padding: 6px 8px;
        }

        .draw-color-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--green-dim);
        }

        #drawColorPicker,
        #featColor {
            width: 34px;
            height: 24px;
            border: 1px solid var(--green);
            background: #000;
            padding: 0;
            cursor: pointer;
        }

        .country-input {
            width: 100%;
            background: #0a140a;
            border: 1px solid var(--border);
            color: var(--green);
            padding: 6px 8px;
            font-family: inherit;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            outline: none;
        }
        .country-input:focus { border-color: var(--green); }



        /* ===== FEATURES PANEL ===== */
        #features-panel {
            bottom: 40px;
            left: 10px;
            width: 230px;
            max-height: 210px;
            display: flex;
            flex-direction: column;
        }

        #features-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
        }

        #features-list::-webkit-scrollbar       { width: 4px; }
        #features-list::-webkit-scrollbar-track { background: #060d06; }
        #features-list::-webkit-scrollbar-thumb { background: var(--border); }

        #features-list li {
            padding: 4px 0;
            border-bottom: 1px solid rgba(31,140,9,0.25);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-size: 10px;
        }
        #features-list li:last-child { border-bottom: none; }
        #features-list li:hover .feat-name { color: var(--green); }

        .feat-color-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-right: 5px;
            flex-shrink: 0;
        }
        .feat-name {
            color: var(--text);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 0.3px;
        }
        .feat-type-tag {
            color: var(--green-dim);
            border: 1px solid rgba(31,140,9,0.55);
            background: rgba(10,20,10,0.7);
            padding: 0 4px;
            font-size: 8px;
            margin-right: 4px;
            flex-shrink: 0;
            line-height: 14px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }
        .feat-del  { cursor: pointer; color: var(--red); font-size: 11px; padding: 0 4px; flex-shrink: 0; }
        .feat-del:hover { opacity: 0.7; }

        .empty-note { color: var(--green-dim); font-size: 10px; font-style: italic; }

        /* ===== STATUS BAR ===== */
        #statusbar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 32px;
            background: linear-gradient(90deg, #000 0%, #0a1a0a 50%, #000 100%);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 2000;
            font-size: 11px;
            color: var(--green-dim);
            letter-spacing: 1px;
        }

        #coords-display { color: var(--green); font-size: 12px; }

        /* ===== LABEL MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.72);
            z-index: 4000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }

        .modal {
            background: #070f07;
            border: 1px solid var(--green);
            box-shadow: 0 0 30px rgba(57,255,20,0.2);
            padding: 22px;
            width: 330px;
        }

        .modal h2 {
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--green);
            text-shadow: 0 0 6px var(--green);
            margin-bottom: 14px;
        }

        .modal label {
            display: block;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
            color: var(--green-dim);
        }

        .modal input, .modal select {
            width: 100%;
            background: #0a140a;
            border: 1px solid var(--border);
            color: var(--green);
            padding: 6px 9px;
            font-family: inherit;
            font-size: 13px;
            margin-bottom: 12px;
            outline: none;
        }
        .modal input:focus, .modal select:focus { border-color: var(--green); }
        .modal select option { background: #070f07; }

        .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
        .modal-btns .btn { width: auto; }

        /* ===== LEAFLET OVERRIDES ===== */
        .leaflet-control-zoom a {
            background: var(--bg-panel) !important;
            border-bottom-color: var(--border) !important;
            color: var(--green) !important;
        }
        .leaflet-control-zoom a:hover { background: var(--green-bg) !important; }

        .leaflet-bar { border: 1px solid var(--border) !important; box-shadow: none !important; }
        .leaflet-bar a { border-bottom: 1px solid var(--border) !important; }

        .leaflet-draw-toolbar a {
            background-color: var(--bg-panel) !important;
        }
        .leaflet-draw-toolbar a:hover { background: var(--green-bg) !important; }

        .leaflet-popup-content-wrapper {
            background: var(--bg-panel) !important;
            border: 1px solid var(--border) !important;
            color: var(--text) !important;
            border-radius: 0 !important;
            box-shadow: 0 0 12px rgba(57,255,20,0.15) !important;
        }
        .leaflet-popup-tip { background: var(--border) !important; }

        .leaflet-control-attribution {
            background: rgba(6,13,6,0.75) !important;
            color: var(--green-dim) !important;
            font-size: 9px !important;
        }
        .leaflet-control-attribution a { color: var(--green) !important; }

        /* Draw tooltip */
        .leaflet-draw-tooltip {
            background: var(--bg-panel) !important;
            border: 1px solid var(--border) !important;
            color: var(--green) !important;
        }
        .leaflet-draw-tooltip-single { margin-top: 0; }

        /* Draw guide lines */
        .leaflet-draw-guide-dash {
            font-size: 1%;
            opacity: 0.6;
        }

        /* First-vertex close dot – pulsing green indicator */
        .mw-close-dot {
            width: 14px; height: 14px;
            background: #39ff14;
            border: 2px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(57,255,20,0.7);
            animation: mw-pulse 1s infinite;
            cursor: pointer;
        }
        @keyframes mw-pulse {
            0%   { box-shadow: 0 0 0 0   rgba(57,255,20,0.7); }
            70%  { box-shadow: 0 0 0 8px rgba(57,255,20,0);   }
            100% { box-shadow: 0 0 0 0   rgba(57,255,20,0);   }
        }

        /* Image marker container */
        .mw-image-marker {
            background: var(--bg-panel);
            border: 2px solid var(--green);
            border-radius: 2px;
            box-shadow: 0 0 12px rgba(57,255,20,0.4);
            overflow: hidden;
            text-align: center;
            font-size: 10px;
            color: var(--green);
        }
        .mw-image-marker img {
            display: block;
            width: 100%;
            height: auto;
            margin-bottom: 2px;
        }
        .mw-image-title {
            padding: 2px 4px;
            background: rgba(6,13,6,0.8);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mw-circle-image-fill {
            clip-path: circle(50% at 50% 50%);
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header id="header">
    <h1>&#9670; MapWar &mdash; Tactical Operations &#9670;</h1>
    <div id="header-right">
        <span>SYS: <span style="color:var(--green)">ONLINE</span></span>
        <span>GRID: <span style="color:var(--green)">ACTIVE</span></span>
        <span id="clock">00:00:00Z</span>
    </div>
</header>

<!-- ===== MAP ===== -->
<div id="map"></div>

<!-- ===== LEFT PANEL ===== -->
<div id="left-panel" class="panel">
    <div class="panel-title">Operations</div>
    <button class="btn" onclick="exportJSON()">Export JSON</button>
    <button class="btn" onclick="triggerImport()">Import JSON</button>
    <input id="jsonFileInput" type="file" accept=".json,.geojson" style="display:none" onchange="importJSON(event)">
    <input id="imageFileInput" type="file" accept="image/*" style="display:none" onchange="prepareImagePlacement(event)">
    <div class="panel-title" style="margin-top:6px">Draw Color</div>
    <div class="draw-color-wrap">
        <span class="draw-color-label">Current</span>
        <input id="drawColorPicker" type="color" value="#39ff14">
    </div>
    <div class="panel-title" style="margin-top:6px">Country Paint</div>
    <button class="btn" id="countryPaintBtn" onclick="toggleCountryPaintMode()">Enable Country Paint</button>
    <button class="btn" id="provincePaintBtn" onclick="toggleProvincePaintMode()">Enable Province Paint (All)</button>
    <div class="panel-title" style="margin-top:6px">Actions</div>
    <button class="btn danger" onclick="clearAll()">Clear All</button>
</div>



<!-- ===== FEATURES LIST ===== -->
<div id="features-panel" class="panel">
    <div class="panel-title">Assets &nbsp;(<span id="feat-count">0</span>)</div>
    <ul id="features-list">
        <li><span class="empty-note">No assets placed yet.</span></li>
    </ul>
</div>

<!-- ===== STATUS BAR ===== -->
<div id="statusbar">
    <span id="coords-display">LAT: &mdash; &nbsp;|&nbsp; LNG: &mdash; &nbsp;|&nbsp; ZOOM: &mdash;</span>
    <span id="feat-status">FEATURES: 0</span>
    <span>MapWar v1.0 &copy; OpenStreetMap contributors</span>
</div>

<!-- ===== LABEL MODAL ===== -->
<div class="modal-overlay" id="labelModal">
    <div class="modal">
        <h2>// Label Feature //</h2>
        <label>Feature Name</label>
        <input type="text" id="featName" placeholder="e.g. SECTOR ALPHA" maxlength="60" autocomplete="off">
        <label>Feature Type</label>
        <select id="featType">
            <option value="border">Border</option>
            <option value="zone">Control Zone</option>
            <option value="route">Route / Path</option>
            <option value="fortification">Fortification</option>
            <option value="marker">Marker / POI</option>
            <option value="other">Other</option>
        </select>
        <label>Draw Color</label>
        <input type="color" id="featColor" value="#39ff14">
        <div class="modal-btns">
            <button class="btn danger" onclick="resetLabel()">Reset</button>
            <button class="btn" onclick="cancelLabel()">Cancel</button>
            <button class="btn" onclick="confirmLabel()">Confirm</button>
        </div>
    </div>
</div>

<!-- ===== ASSET EDIT MODAL ===== -->
<div class="modal-overlay" id="assetEditModal">
    <div class="modal">
        <h2>// Edit Asset //</h2>
        <label>Feature Name</label>
        <input type="text" id="editFeatName" maxlength="60" autocomplete="off">
        <label>Feature Type</label>
        <select id="editFeatType">
            <option value="border">Border</option>
            <option value="zone">Control Zone</option>
            <option value="route">Route / Path</option>
            <option value="fortification">Fortification</option>
            <option value="marker">Marker / POI</option>
            <option value="other">Other</option>
        </select>
        <label>Draw Color</label>
        <input type="color" id="editFeatColor" value="#39ff14">
        <label id="editImageLabel" style="display:none">Circle Image</label>
        <div id="editImageControls" style="display:none; gap:6px; align-items:center; margin-bottom:12px;">
            <button class="btn" type="button" onclick="addImageFromEditModal()" style="width:auto">Upload/Replace Image</button>
            <button class="btn danger" type="button" onclick="removeImageFromEditModal()" style="width:auto">Remove Image</button>
        </div>
        <div class="modal-btns">
            <button class="btn" onclick="closeAssetEditModal()">Cancel</button>
            <button class="btn" onclick="saveAssetEditModal()">Save</button>
        </div>
    </div>
</div>

<!-- ===== SCRIPTS ===== -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js" crossorigin=""></script>

<script>
// =====================================================================
//  TILE LAYER  — Night Ops dark (CartoDB Dark no labels, free, no key)
// =====================================================================
const darkTile = L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',
    {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20
    }
);

// =====================================================================
//  MAP INIT
// =====================================================================
const map = L.map('map', {
    center: [25, 15],
    zoom: 3,
    zoomControl: false,
    layers: [darkTile]
});

L.control.zoom({ position: 'bottomright' }).addTo(map);

// Dedicated pane so circle images render above vector borders.
map.createPane('circleImagePane');
map.getPane('circleImagePane').style.zIndex = 650;
map.getPane('circleImagePane').style.pointerEvents = 'none';

// =====================================================================
//  DRAWN ITEMS
// =====================================================================
const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

// Map of leaflet layer-id -> { name, type, color, imageData }
const featureMeta = new Map();
let countriesGeoJSONCache = null;
let provincesGeoJSONCache = null;

// Circle image attachment state
let _circleImageTarget = null;
const circleImageOverlays = new Map(); // layerId -> L.ImageOverlay
let countryPaintLayer = null;
let countryPaintEnabled = false;
const countryPaintSelections = new Map(); // countryKey -> color
let provincePaintLayer = null;
let provincePaintEnabled = false;
const provincePaintSelections = new Map(); // provinceKey -> color

// =====================================================================
//  DRAW CONTROL
// =====================================================================
const TYPE_COLORS = {
    border:       '#ff3333',
    zone:         '#ffd700',
    route:        '#39ff14',
    fortification:'#ff8c00',
    marker:       '#00ffff',
    other:        '#a0d890'
};

let currentDrawColor = '#39ff14';

function applyCurrentDrawColorToTools() {
    const modes = drawControl && drawControl._toolbars && drawControl._toolbars.draw && drawControl._toolbars.draw._modes;
    if (!modes) return;

    if (modes.polyline && modes.polyline.handler && modes.polyline.handler.options) {
        modes.polyline.handler.options.shapeOptions = { color: currentDrawColor, weight: 2.5 };
    }
    if (modes.polygon && modes.polygon.handler && modes.polygon.handler.options) {
        modes.polygon.handler.options.shapeOptions = shapeOpts(currentDrawColor);
    }
    if (modes.rectangle && modes.rectangle.handler && modes.rectangle.handler.options) {
        modes.rectangle.handler.options.shapeOptions = shapeOpts(currentDrawColor);
    }
    if (modes.circle && modes.circle.handler && modes.circle.handler.options) {
        modes.circle.handler.options.shapeOptions = shapeOpts(currentDrawColor);
    }
}

function shapeOpts(color) {
    return { color, weight: 2.5, fill: true, fillColor: color, fillOpacity: 0.55 };
}

const drawControl = new L.Control.Draw({
    position: 'topright',
    edit: {
        featureGroup: drawnItems,
        poly: { allowIntersection: false }
    },
    draw: {
        polygon: {
            allowIntersection: false,
            showArea: true,
            shapeOptions: shapeOpts(currentDrawColor)
        },
        polyline: {
            shapeOptions: { color: currentDrawColor, weight: 2.5 }
        },
        rectangle: {
            shapeOptions: shapeOpts(currentDrawColor)
        },
        circle: {
            shapeOptions: shapeOpts(currentDrawColor)
        },
        marker: {
            icon: militaryIcon()
        },
        circlemarker: false
    }
});
map.addControl(drawControl);
applyCurrentDrawColorToTools();

const drawColorPicker = document.getElementById('drawColorPicker');
if (drawColorPicker) {
    drawColorPicker.addEventListener('input', function (e) {
        currentDrawColor = e.target.value || '#39ff14';
        applyCurrentDrawColorToTools();
    });
}

const COUNTRIES_GEOJSON_URL = 'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson';
const PROVINCES_GEOJSON_URL = 'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_10m_admin_1_states_provinces.geojson';

function normalizeCountryName(name) {
    return String(name || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-zA-Z0-9 ]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .toUpperCase();
}

function getProvinceCountryLabels(feature) {
    const props = feature && feature.properties ? feature.properties : {};
    return [
        props.adm0_name,
        props.admin,
        props.geonunit,
        props.sovereignt,
        props.brk_name,
        props.name,
        props.name_en,
        props.iso_a2,
        props.iso_a3,
        props.adm0_a3,
        props.gu_a3,
        props.su_a3
    ].filter(Boolean);
}

async function getCountriesGeoJSON() {
    if (countriesGeoJSONCache) return countriesGeoJSONCache;
    const res = await fetch(COUNTRIES_GEOJSON_URL);
    if (!res.ok) throw new Error('Country border dataset unavailable');
    countriesGeoJSONCache = await res.json();
    return countriesGeoJSONCache;
}

async function getProvincesGeoJSON() {
    if (provincesGeoJSONCache) return provincesGeoJSONCache;
    const res = await fetch(PROVINCES_GEOJSON_URL);
    if (!res.ok) throw new Error('Province border dataset unavailable');
    provincesGeoJSONCache = await res.json();
    return provincesGeoJSONCache;
}

function provinceFeatureMatchesCountry(feature, wanted) {
    const candidates = getProvinceCountryLabels(feature).map(normalizeCountryName).filter(Boolean);

    if (candidates.includes(wanted)) return true;
    if (wanted.length >= 4) {
        return candidates.some(function (candidate) {
            return candidate.length >= 4 && (candidate.startsWith(wanted) || wanted.startsWith(candidate));
        });
    }
    return false;
}

function getProvinceKey(feature) {
    const props = feature && feature.properties ? feature.properties : {};
    return normalizeCountryName([
        props.adm1_code,
        props.iso_3166_2,
        props.name_en,
        props.name,
        props.adm0_name,
        props.admin,
        props.adm0_a3
    ].filter(Boolean).join('|'));
}

function getCountryKey(feature) {
    const props = feature && feature.properties ? feature.properties : {};
    return normalizeCountryName([
        props['ISO3166-1-Alpha-3'],
        props['ISO3166-1-Alpha-2'],
        props.iso_a3,
        props.iso_a2,
        props.name,
        props.NAME,
        props.ADMIN
    ].filter(Boolean).join('|'));
}

function countryBaseStyle() {
    return {
        color: '#9aa69a',
        weight: 0.45,
        opacity: 1,
        fill: true,
        fillColor: '#7a7a7a',
        fillOpacity: 0
    };
}

function countryPaintedStyle(color) {
    return {
        color: color,
        weight: 0.0,
        opacity: 1,
        fill: true,
        fillColor: color,
        fillOpacity: 0.45
    };
}

function countryHiddenStyle() {
    return {
        color: '#000000',
        weight: 0,
        opacity: 0,
        fill: true,
        fillColor: '#000000',
        fillOpacity: 0
    };
}

function setCountryPaintButtonState() {
    const btn = document.getElementById('countryPaintBtn');
    if (!btn) return;
    btn.textContent = countryPaintEnabled ? 'Disable Country Paint' : 'Enable Country Paint';
}

function refreshCountryLayerStyles() {
    if (!countryPaintLayer) return;
    countryPaintLayer.eachLayer(function (layer) {
        const key = layer._countryKey;
        if (key && countryPaintSelections.has(key)) {
            layer.setStyle(countryPaintedStyle(countryPaintSelections.get(key)));
        } else {
            layer.setStyle(countryPaintEnabled ? countryBaseStyle() : countryHiddenStyle());
        }
        // Keep country overlay visible but non-interactive when mode is disabled.
        if (layer._path) {
            layer._path.style.pointerEvents = countryPaintEnabled ? 'auto' : 'none';
        }
    });
}

function disableCountryPaintMode() {
    countryPaintEnabled = false;
    refreshCountryLayerStyles();
    setCountryPaintButtonState();
}

async function toggleCountryPaintMode() {
    if (countryPaintEnabled) {
        disableCountryPaintMode();
        return;
    }
    disableProvincePaintMode();
    if (countryPaintLayer) {
        if (!map.hasLayer(countryPaintLayer)) {
            countryPaintLayer.addTo(map);
        }
        countryPaintEnabled = true;
        refreshCountryLayerStyles();
        setCountryPaintButtonState();
        return;
    }

    try {
        const data = await getCountriesGeoJSON();
        countryPaintLayer = L.geoJSON(data, {
            style: function () { return countryBaseStyle(); },
            onEachFeature: function (feature, layer) {
                const key = getCountryKey(feature);
                layer._countryKey = key;

                if (countryPaintSelections.has(key)) {
                    layer.setStyle(countryPaintedStyle(countryPaintSelections.get(key)));
                }

                layer.on('click', function () {
                    if (!countryPaintEnabled) return;
                    if (countryPaintSelections.has(key)) {
                        countryPaintSelections.delete(key);
                        layer.setStyle(countryBaseStyle());
                    } else {
                        const color = currentDrawColor;
                        countryPaintSelections.set(key, color);
                        layer.setStyle(countryPaintedStyle(color));
                    }
                });
            }
        }).addTo(map);

        countryPaintEnabled = true;
        refreshCountryLayerStyles();
        setCountryPaintButtonState();
    } catch (err) {
        alert('Could not load countries: ' + err.message);
    }
}

function provinceBaseStyle() {
    return {
        color: '#9aa69a',
        weight: 0.45,
        opacity: 1,
        fill: true,
        fillColor: '#7a7a7a',
        fillOpacity: 0
    };
}

function provincePaintedStyle(color) {
    return {
        color: color,
        weight: 0.0,
        opacity: 1,
        fill: true,
        fillColor: color,
        fillOpacity: 0.45
    };
}

function provinceHiddenStyle() {
    return {
        color: '#000000',
        weight: 0,
        opacity: 0,
        fill: true,
        fillColor: '#000000',
        fillOpacity: 0
    };
}

function setProvincePaintButtonState() {
    const btn = document.getElementById('provincePaintBtn');
    if (!btn) return;
    btn.textContent = provincePaintEnabled ? 'Disable Province Paint (All)' : 'Enable Province Paint (All)';
}

function refreshProvinceLayerStyles() {
    if (!provincePaintLayer) return;
    provincePaintLayer.eachLayer(function (layer) {
        const provinceKey = layer._provinceKey;
        if (provinceKey && provincePaintSelections.has(provinceKey)) {
            layer.setStyle(provincePaintedStyle(provincePaintSelections.get(provinceKey)));
        } else {
            layer.setStyle(provincePaintEnabled ? provinceBaseStyle() : provinceHiddenStyle());
        }
        // Keep province overlay visible but non-interactive when mode is disabled.
        if (layer._path) {
            layer._path.style.pointerEvents = provincePaintEnabled ? 'auto' : 'none';
        }
    });
}

function disableProvincePaintMode() {
    provincePaintEnabled = false;
    refreshProvinceLayerStyles();
    setProvincePaintButtonState();
}

async function toggleProvincePaintMode() {
    if (provincePaintEnabled) {
        disableProvincePaintMode();
        return;
    }
    disableCountryPaintMode();

    // If the province layer already exists, just re-enable paint mode.
    if (provincePaintLayer) {
        if (!map.hasLayer(provincePaintLayer)) {
            provincePaintLayer.addTo(map);
        }
        provincePaintEnabled = true;
        refreshProvinceLayerStyles();
        setProvincePaintButtonState();
        return;
    }

    try {
        const data = await getProvincesGeoJSON();

        provincePaintLayer = L.geoJSON(data, {
            style: function () {
                return provinceBaseStyle();
            },
            onEachFeature: function (feature, layer) {
                const provinceKey = getProvinceKey(feature);
                layer._provinceKey = provinceKey;

                if (provincePaintSelections.has(provinceKey)) {
                    layer.setStyle(provincePaintedStyle(provincePaintSelections.get(provinceKey)));
                }

                layer.on('click', function () {
                    if (!provincePaintEnabled) return;
                    if (provincePaintSelections.has(provinceKey)) {
                        provincePaintSelections.delete(provinceKey);
                        layer.setStyle(provinceBaseStyle());
                    } else {
                        const color = currentDrawColor;
                        provincePaintSelections.set(provinceKey, color);
                        layer.setStyle(provincePaintedStyle(color));
                    }
                });
            }
        }).addTo(map);

        if (!provincePaintLayer.getLayers().length) {
            map.removeLayer(provincePaintLayer);
            provincePaintLayer = null;
            alert('No provinces found in province dataset.');
            return;
        }

        provincePaintEnabled = true;
        refreshProvinceLayerStyles();
        setProvincePaintButtonState();
        map.fitBounds(provincePaintLayer.getBounds(), { padding: [30, 30] });
    } catch (err) {
        alert('Could not load provinces: ' + err.message);
    }
}

function militaryIcon() {
    return L.divIcon({
        className: '',
        html: '<div style="width:12px;height:12px;background:#39ff14;border:2px solid #060d06;transform:rotate(45deg);box-shadow:0 0 6px #39ff14"></div>',
        iconSize: [12, 12],

// =====================================================================
//  LABEL MODAL STATE
// =====================================================================
let _pendingLayer    = null;
let _pendingLayerType = null;
let _editingFeatureId = null;

map.on(L.Draw.Event.CREATED, function (e) {
    _pendingLayer     = e.layer;
    _pendingLayerType = e.layerType;

    // Pre-select sensible type default
    const defaultType =
        _pendingLayerType === 'polyline' ? 'route' :
        _pendingLayerType === 'marker'   ? 'marker' :
        'border';

    document.getElementById('featName').value      = '';
    document.getElementById('featType').value      = defaultType;
    const featColorEl = document.getElementById('featColor');
    if (featColorEl) featColorEl.value = currentDrawColor;
    document.getElementById('labelModal').classList.add('open');
    document.getElementById('featName').focus();
});

function confirmLabel() {
    if (!_pendingLayer) return;

    const name  = document.getElementById('featName').value.trim() ||
                  'Feature #' + (featureMeta.size + 1);
    const type  = document.getElementById('featType').value;
    const selectedColor = (document.getElementById('featColor').value || currentDrawColor);
    const color = ((_pendingLayerType === 'polyline' || _pendingLayerType === 'circle' || _pendingLayerType === 'polygon' || _pendingLayerType === 'rectangle')
                  ? selectedColor
                  : (TYPE_COLORS[type] || TYPE_COLORS.other));

    // Style the layer based on type
    if (_pendingLayer.setStyle) {
        if (_pendingLayerType === 'polyline') {
            _pendingLayer.setStyle({ color, weight: 2.5 });
        } else {
            _pendingLayer.setStyle(shapeOpts(color));
        }
    }

    drawnItems.addLayer(_pendingLayer);
    const id = drawnItems.getLayerId(_pendingLayer);
    featureMeta.set(id, { name, type, color });
    bindLayerEditShortcut(_pendingLayer, id);

    _pendingLayer.bindPopup(makePopupHTML(name, type, color));

    _pendingLayer     = null;
    _pendingLayerType = null;
    document.getElementById('labelModal').classList.remove('open');
    renderFeaturesList();
}

function cancelLabel() {
    // Cancel should keep recent work: autosave pending shape with defaults.
    if (!_pendingLayer) {
        document.getElementById('labelModal').classList.remove('open');
        return;
    }

    const type =
        _pendingLayerType === 'polyline' ? 'route' :
        _pendingLayerType === 'marker'   ? 'marker' :
        'border';
    const color = (document.getElementById('featColor').value || currentDrawColor);
    const name = 'Feature #' + (featureMeta.size + 1);

    if (_pendingLayer.setStyle) {
        if (_pendingLayerType === 'polyline') {
            _pendingLayer.setStyle({ color, weight: 2.5 });
        } else {
            _pendingLayer.setStyle(shapeOpts(color));
        }
    }

    drawnItems.addLayer(_pendingLayer);
    const id = drawnItems.getLayerId(_pendingLayer);
    featureMeta.set(id, { name, type, color });
    bindLayerEditShortcut(_pendingLayer, id);
    _pendingLayer.bindPopup(makePopupHTML(name, type, color));

    _pendingLayer     = null;
    _pendingLayerType = null;
    document.getElementById('labelModal').classList.remove('open');
    renderFeaturesList();
}

function resetLabel() {
    // Explicit discard/reset for the pending drawn shape.
    _pendingLayer     = null;
    _pendingLayerType = null;
    document.getElementById('labelModal').classList.remove('open');
}

// Keyboard shortcuts inside modal
document.getElementById('featName').addEventListener('keydown', function (e) {
    if (e.key === 'Enter')  confirmLabel();
    if (e.key === 'Escape') cancelLabel();
});

map.on(L.Draw.Event.DELETED, function (e) {
    e.layers.eachLayer(function (layer) {
        const layerId = drawnItems.getLayerId(layer);
        const overlay = circleImageOverlays.get(layerId);
        if (overlay) {
            map.removeLayer(overlay);
            circleImageOverlays.delete(layerId);
        }
        featureMeta.delete(layerId);
    });
    renderFeaturesList();
});

map.on(L.Draw.Event.EDITED, function (e) {
    e.layers.eachLayer(function (layer) {
        if (!(layer instanceof L.Circle)) return;
        const layerId = drawnItems.getLayerId(layer);
        const overlay = circleImageOverlays.get(layerId);
        if (overlay) {
            overlay.setBounds(getCircleImageBounds(layer));
            layer.setStyle({ fillOpacity: 0 });
        }
    });
    renderFeaturesList();
});

// =====================================================================
//  FEATURES LIST
// =====================================================================
function makePopupHTML(name, type, color) {
    const popupColor = color || TYPE_COLORS[type] || TYPE_COLORS.other;
    return `<b style="color:${popupColor};font-size:13px">${escapeHTML(name)}</b>` +
           `<br><span style="font-size:10px;color:#a0d890;letter-spacing:2px">${type.toUpperCase()}</span>`;
}

function isValidHexColor(value) {
    return /^#[0-9a-f]{6}$/i.test(String(value || '').trim());
}

function isValidFeatureType(value) {
    return Object.prototype.hasOwnProperty.call(TYPE_COLORS, String(value || '').trim());
}

function applyFeatureStyle(id) {
    const layer = drawnItems.getLayer(id);
    const meta = featureMeta.get(id);
    if (!layer || !meta) return;

    if (layer.setStyle) {
        if (layer instanceof L.Polyline && !(layer instanceof L.Polygon)) {
            layer.setStyle({ color: meta.color, weight: 2.5 });
        } else {
            layer.setStyle(shapeOpts(meta.color));
        }

        const hasImage = !!meta.imageData;
        if (layer instanceof L.Circle && hasImage) {
            layer.setStyle({ fillOpacity: 0 });
        }
    }

    layer.bindPopup(makePopupHTML(meta.name, meta.type, meta.color));
}

function bindLayerEditShortcut(layer, id) {
    if (!layer || typeof layer.on !== 'function') return;
    layer.on('dblclick', function (e) {
        if (e && e.originalEvent) {
            e.originalEvent.preventDefault();
            e.originalEvent.stopPropagation();
        }
        openAssetEditModal(id);
    });
}

function changeFeatureType(id, nextType) {
    const meta = featureMeta.get(id);
    if (!meta) return;
    if (!isValidFeatureType(nextType)) return;
    meta.type = nextType;
    featureMeta.set(id, meta);
    applyFeatureStyle(id);
    renderFeaturesList();
}

function openAssetEditModal(id) {
    const meta = featureMeta.get(id);
    if (!meta) return;
    _editingFeatureId = id;
    document.getElementById('editFeatName').value = meta.name || '';
    document.getElementById('editFeatType').value = isValidFeatureType(meta.type) ? meta.type : 'other';
    document.getElementById('editFeatColor').value = isValidHexColor(meta.color) ? meta.color : '#39ff14';
    updateEditImageControls();
    document.getElementById('assetEditModal').classList.add('open');
    document.getElementById('editFeatName').focus();
}

function closeAssetEditModal() {
    _editingFeatureId = null;
    document.getElementById('assetEditModal').classList.remove('open');
}

function updateEditImageControls() {
    const labelEl = document.getElementById('editImageLabel');
    const controlsEl = document.getElementById('editImageControls');
    const removeBtn = controlsEl ? controlsEl.querySelector('.btn.danger') : null;
    if (!labelEl || !controlsEl) return;

    const layer = _editingFeatureId !== null ? drawnItems.getLayer(_editingFeatureId) : null;
    const isCircle = !!(layer && layer instanceof L.Circle);
    labelEl.style.display = isCircle ? 'block' : 'none';
    controlsEl.style.display = isCircle ? 'flex' : 'none';

    if (removeBtn && isCircle) {
        const meta = featureMeta.get(_editingFeatureId) || {};
        removeBtn.disabled = !meta.imageData;
    }
}

function addImageFromEditModal() {
    if (_editingFeatureId === null) return;
    const layer = drawnItems.getLayer(_editingFeatureId);
    if (!(layer instanceof L.Circle)) {
        alert('Image can only be attached to circle assets.');
        return;
    }
    _circleImageTarget = _editingFeatureId;
    const input = document.getElementById('imageFileInput');
    if (!input) return;
    input.click();
}

function removeImageFromEditModal() {
    if (_editingFeatureId === null) return;
    const layer = drawnItems.getLayer(_editingFeatureId);
    if (!(layer instanceof L.Circle)) return;

    const meta = featureMeta.get(_editingFeatureId);
    if (!meta) return;
    delete meta.imageData;
    featureMeta.set(_editingFeatureId, meta);

    const overlay = circleImageOverlays.get(_editingFeatureId);
    if (overlay) {
        map.removeLayer(overlay);
        circleImageOverlays.delete(_editingFeatureId);
    }

    applyFeatureStyle(_editingFeatureId);
    updateEditImageControls();
    renderFeaturesList();
}

function saveAssetEditModal() {
    if (_editingFeatureId === null) return;
    const meta = featureMeta.get(_editingFeatureId);
    if (!meta) {
        closeAssetEditModal();
        return;
    }

    const nextName = document.getElementById('editFeatName').value.trim();
    const nextType = document.getElementById('editFeatType').value;
    const nextColor = document.getElementById('editFeatColor').value;

    meta.name = nextName || meta.name;
    if (isValidFeatureType(nextType)) meta.type = nextType;
    if (isValidHexColor(nextColor)) meta.color = nextColor;

    featureMeta.set(_editingFeatureId, meta);
    applyFeatureStyle(_editingFeatureId);
    closeAssetEditModal();
    renderFeaturesList();
}

document.getElementById('editFeatName').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') saveAssetEditModal();
    if (e.key === 'Escape') closeAssetEditModal();
});

function renderFeaturesList() {
    const list  = document.getElementById('features-list');
    const count = drawnItems.getLayers().length;

    document.getElementById('feat-count').textContent  = count;
    document.getElementById('feat-status').textContent = 'ASSETS: ' + count;

    if (count === 0) {
        list.innerHTML = '<li><span class="empty-note">No assets placed yet.</span></li>';
        return;
    }

    list.innerHTML = '';

    // Drawn shapes
    drawnItems.eachLayer(function (layer) {
        if (layer instanceof L.Circle) return;
        const id   = drawnItems.getLayerId(layer);
        const meta = featureMeta.get(id) || { name: 'Unnamed', type: 'other', color: '#a0d890' };
        const geomLabel = layer instanceof L.Marker ? 'MARKER' : meta.type.toUpperCase();

        const li   = document.createElement('li');
        li.title   = 'Click to zoom';
        li.innerHTML =
            `<span class="feat-color-dot" style="background:${meta.color}"></span>` +
            `<span class="feat-name">#${id} [${geomLabel}] ${escapeHTML(meta.name)}</span>` +
            `<span class="feat-type-tag">${meta.type.toUpperCase()}</span>` +
            `<button class="btn" onclick="openAssetEditModal(${id});event.stopPropagation();" style="margin:0 2px;padding:1px 6px;font-size:9px;line-height:1.2;">EDIT</button>` +
            `<span class="feat-del" title="Delete" onclick="deleteFeature(${id});event.stopPropagation();">&#10005;</span>`;

        li.addEventListener('click', function (e) {
            if (e.target.closest('button') || e.target.closest('input') || e.target.classList.contains('feat-del')) return;
            if (layer.getBounds) {
                map.fitBounds(layer.getBounds(), { padding: [40, 40] });
            } else if (layer.getLatLng) {
                map.setView(layer.getLatLng(), 10);
            }
            if (layer.openPopup) layer.openPopup();
        });

        list.appendChild(li);
    });

    // Circles with option to add image
    drawnItems.eachLayer(function (layer) {
        if (!(layer instanceof L.Circle)) return;
        const id   = drawnItems.getLayerId(layer);
        const meta = featureMeta.get(id) || { name: 'Unnamed', type: 'other', color: '#a0d890' };

        const hasImage = meta.imageData ? ' [IMG]' : '';
        const li   = document.createElement('li');
        li.title   = 'Click to zoom';
        li.innerHTML =
            `<span class="feat-color-dot" style="background:${meta.color}"></span>` +
            `<span class="feat-name">#${id} [CIRCLE] ${escapeHTML(meta.name)}${hasImage}</span>` +
            `<span class="feat-type-tag">${meta.type.toUpperCase()}</span>` +
            `<button onclick="addImageToCircle(${id});event.stopPropagation();" style="margin:0 2px; padding:2px 6px; font-size:9px; cursor:pointer; background:transparent; border:1px solid var(--green); color:var(--green);">+IMG</button>` +
            `<button class="btn" onclick="openAssetEditModal(${id});event.stopPropagation();" style="margin:0 2px;padding:1px 6px;font-size:9px;line-height:1.2;">EDIT</button>` +
            `<span class="feat-del" title="Delete" onclick="deleteFeature(${id});event.stopPropagation();">&#10005;</span>`;

        li.addEventListener('click', function (e) {
            if (e.target.closest('button') || e.target.closest('input') || e.target.classList.contains('feat-del')) return;
            map.fitBounds(layer.getBounds(), { padding: [40, 40] });
            if (layer.openPopup) layer.openPopup();
        });

        list.appendChild(li);
    });
}

function deleteFeature(id) {
    const layer = drawnItems.getLayer(id);
    if (layer) {
        const overlay = circleImageOverlays.get(id);
        if (overlay) {
            map.removeLayer(overlay);
            circleImageOverlays.delete(id);
        }
        drawnItems.removeLayer(layer);
        featureMeta.delete(id);
        renderFeaturesList();
    }
}

//  ADD IMAGE TO CIRCLE
// =====================================================================

function addImageToCircle(circleId) {
    _circleImageTarget = circleId;
    const input = document.getElementById('imageFileInput');
    if (!input) {
        alert('Image input is missing. Reload the page and try again.');
        return;
    }
    input.click();
}

function getCircleImageBounds(circle) {
    const center = circle.getLatLng();
    const b = circle.getBounds();

    const cPt = map.latLngToLayerPoint(center);
    const nPt = map.latLngToLayerPoint(L.latLng(b.getNorth(), center.lng));
    const ePt = map.latLngToLayerPoint(L.latLng(center.lat, b.getEast()));
    const radiusY = Math.max(1, Math.abs(cPt.y - nPt.y));
    const radiusX = Math.max(1, Math.abs(ePt.x - cPt.x));

    const radius = Math.min(radiusX, radiusY);
    const w = radius * 2;
    const h = radius * 2;

    const nwPt = L.point(cPt.x - (w / 2), cPt.y - (h / 2));
    const sePt = L.point(cPt.x + (w / 2), cPt.y + (h / 2));
    return L.latLngBounds(map.layerPointToLatLng(nwPt), map.layerPointToLatLng(sePt));
}

function refreshCircleImageOverlay(circleId) {
    const layer = drawnItems.getLayer(circleId);
    const overlay = circleImageOverlays.get(circleId);
    if (!overlay || !layer || !(layer instanceof L.Circle)) return;
    overlay.setBounds(getCircleImageBounds(layer));
}

function refreshAllCircleImageOverlays() {
    circleImageOverlays.forEach(function (_overlay, circleId) {
        refreshCircleImageOverlay(circleId);
    });
}

function attachImageToCircle(circleId, imageData) {
    const layer = drawnItems.getLayer(circleId);
    if (!layer || !(layer instanceof L.Circle)) return;

    const existing = circleImageOverlays.get(circleId);
    if (existing) {
        map.removeLayer(existing);
        circleImageOverlays.delete(circleId);
    }

    const overlay = L.imageOverlay(imageData, getCircleImageBounds(layer), {
        className: 'mw-circle-image-fill',
        interactive: false,
        pane: 'circleImagePane',
        opacity: 1
    });
    overlay.addTo(map);
    if (overlay.bringToFront) overlay.bringToFront();
    circleImageOverlays.set(circleId, overlay);
    refreshCircleImageOverlay(circleId);
    layer.setStyle({ fillOpacity: 0 });
}

// Keep image overlays synchronized with circle geometry as map scale/position changes.
map.on('zoomend moveend resize', function () {
    refreshAllCircleImageOverlays();
});

function prepareImagePlacement(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function (e) {
        const imageData = e.target.result; // Base64 data URL
        
        if (_circleImageTarget !== null) {
            // Adding image to circle
            const layer = drawnItems.getLayer(_circleImageTarget);
            if (layer && layer instanceof L.Circle) {
                const meta = featureMeta.get(_circleImageTarget) || { name: 'Unnamed', type: 'other', color: '#a0d890' };
                meta.imageData = imageData;
                featureMeta.set(_circleImageTarget, meta);
                attachImageToCircle(_circleImageTarget, imageData);
                if (_editingFeatureId === _circleImageTarget) {
                    updateEditImageControls();
                }
                _circleImageTarget = null;
                renderFeaturesList();
            }
        }
    };
    reader.readAsDataURL(file);
    event.target.value = '';
}

// =====================================================================
//  EXPORT JSON  (GeoJSON + custom metadata)
// =====================================================================
function exportJSON() {
    const layers = drawnItems.getLayers();
    if (layers.length === 0 && provincePaintSelections.size === 0) {
        alert('Nothing to export — draw some features first.');
        return;
    }

    const geojson = {
        type: 'FeatureCollection',
        metadata: {
            application: 'MapWar Tactical Operations',
            version: '1.0',
            exportedAt: new Date().toISOString()
        },
        features: [],
        countryPaint: Object.fromEntries(countryPaintSelections),
        provincePaint: Object.fromEntries(provincePaintSelections)
    };

    drawnItems.eachLayer(function (layer) {
        let feature;
        try { feature = layer.toGeoJSON(); } catch (_) { return; }

        const id   = drawnItems.getLayerId(layer);
        const meta = featureMeta.get(id) || { name: 'Unnamed', type: 'other', color: '#a0d890' };

        feature.properties = {
            name:  meta.name,
            type:  meta.type,
            color: meta.color
        };

        // Include image data if present (for circles)
        if (meta.imageData) {
            feature.properties.imageData = meta.imageData;
            feature.properties.imageAspect = meta.imageAspect || 1;
        }

        // L.Circle radius is not encoded in standard GeoJSON
        if (layer instanceof L.Circle) {
            feature.properties.radius = layer.getRadius();
        }

        geojson.features.push(feature);
    });

    const json = JSON.stringify(geojson, null, 2);
    const blob = new Blob([json], { type: 'application/geo+json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'map-data.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

function triggerImport() {
    document.getElementById('jsonFileInput').click();
}

function importJSON(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async function (e) {
        try {
            const geojson = JSON.parse(e.target.result);

            // Restore province paint map first (if present)
            countryPaintSelections.clear();
            if (geojson.countryPaint && typeof geojson.countryPaint === 'object') {
                Object.keys(geojson.countryPaint).forEach(function (k) {
                    const c = geojson.countryPaint[k];
                    if (typeof c === 'string' && c.trim()) {
                        countryPaintSelections.set(k, c);
                    }
                });
            }

            // Restore province paint map
            provincePaintSelections.clear();
            if (geojson.provincePaint && typeof geojson.provincePaint === 'object') {
                Object.keys(geojson.provincePaint).forEach(function (k) {
                    const c = geojson.provincePaint[k];
                    if (typeof c === 'string' && c.trim()) {
                        provincePaintSelections.set(k, c);
                    }
                });
            }

            L.geoJSON(geojson, {
                style: function (feature) {
                    const type  = (feature.properties && feature.properties.type)  || 'other';
                    const color = (feature.properties && feature.properties.color) || TYPE_COLORS[type] || TYPE_COLORS.other;
                    return { color, weight: 2, fillColor: color, fillOpacity: 0.55 };
                },
                pointToLayer: function (feature, latlng) {
                    if (feature.properties && feature.properties.radius) {
                        const type  = feature.properties.type || 'other';
                        const color = (feature.properties && feature.properties.color) || TYPE_COLORS[type] || TYPE_COLORS.other;
                        return L.circle(latlng, {
                            radius: feature.properties.radius,
                            ...shapeOpts(color)
                        });
                    }
                    return L.marker(latlng, { icon: militaryIcon() });
                },
                onEachFeature: function (feature, layer) {
                    drawnItems.addLayer(layer);
                    const id    = drawnItems.getLayerId(layer);
                    const name  = (feature.properties && feature.properties.name)  || 'Imported';
                    const type  = (feature.properties && feature.properties.type)  || 'other';
                    const color = (feature.properties && feature.properties.color) || TYPE_COLORS[type] || TYPE_COLORS.other;
                    const imageData = (feature.properties && feature.properties.imageData) || undefined;
                    
                    featureMeta.set(id, { name, type, color, imageData });
                    bindLayerEditShortcut(layer, id);
                    layer.bindPopup(makePopupHTML(name, type, color));
                    
                    // If circle has image, place it at center
                    if (layer instanceof L.Circle && imageData) {
                        attachImageToCircle(id, imageData);
                    }
                }
            });

            renderFeaturesList();

            // If country paint data exists, render country layer so colors appear immediately.
            if (countryPaintSelections.size > 0) {
                try {
                    if (countryPaintLayer) {
                        map.removeLayer(countryPaintLayer);
                        countryPaintLayer = null;
                    }
                    const cData = await getCountriesGeoJSON();
                    countryPaintLayer = L.geoJSON(cData, {
                        style: function () { return countryBaseStyle(); },
                        onEachFeature: function (feature, layer) {
                            const key = getCountryKey(feature);
                            layer._countryKey = key;
                            if (countryPaintSelections.has(key)) {
                                layer.setStyle(countryPaintedStyle(countryPaintSelections.get(key)));
                            }
                            layer.on('click', function () {
                                if (!countryPaintEnabled) return;
                                if (countryPaintSelections.has(key)) {
                                    countryPaintSelections.delete(key);
                                    layer.setStyle(countryBaseStyle());
                                } else {
                                    const color = currentDrawColor;
                                    countryPaintSelections.set(key, color);
                                    layer.setStyle(countryPaintedStyle(color));
                                }
                            });
                        }
                    }).addTo(map);
                    countryPaintEnabled = true;
                    setCountryPaintButtonState();
                } catch (_) {}
            }

            // If province paint data exists, render province layer so colors appear immediately.
            if (provincePaintSelections.size > 0) {
                try {
                    if (provincePaintLayer) {
                        map.removeLayer(provincePaintLayer);
                        provincePaintLayer = null;
                    }
                    const pData = await getProvincesGeoJSON();
                    provincePaintLayer = L.geoJSON(pData, {
                        style: function () { return provinceBaseStyle(); },
                        onEachFeature: function (feature, layer) {
                            const provinceKey = getProvinceKey(feature);
                            layer._provinceKey = provinceKey;
                            if (provincePaintSelections.has(provinceKey)) {
                                layer.setStyle(provincePaintedStyle(provincePaintSelections.get(provinceKey)));
                            }
                            layer.on('click', function () {
                                if (!provincePaintEnabled) return;
                                if (provincePaintSelections.has(provinceKey)) {
                                    provincePaintSelections.delete(provinceKey);
                                    layer.setStyle(provinceBaseStyle());
                                } else {
                                    const color = currentDrawColor;
                                    provincePaintSelections.set(provinceKey, color);
                                    layer.setStyle(provincePaintedStyle(color));
                                }
                            });
                        }
                    }).addTo(map);
                    provincePaintEnabled = true;
                    setProvincePaintButtonState();
                } catch (_) {}
            }

            if (drawnItems.getLayers().length > 0) {
                try {
                    map.fitBounds(drawnItems.getBounds(), { padding: [40, 40] });
                } catch (_) {}
            }
        } catch (err) {
            alert('Could not parse file: ' + err.message);
        }
    };
    reader.readAsText(file);
    event.target.value = ''; // allow re-importing same file
}

// =====================================================================
//  CLEAR ALL
// =====================================================================
function clearAll() {
    if (drawnItems.getLayers().length === 0 && !countryPaintLayer && !provincePaintLayer && countryPaintSelections.size === 0 && provincePaintSelections.size === 0) return;
    if (confirm('Clear ALL features? This cannot be undone.')) {
        disableCountryPaintMode();
        countryPaintSelections.clear();
        if (countryPaintLayer) {
            map.removeLayer(countryPaintLayer);
            countryPaintLayer = null;
        }
        disableProvincePaintMode();
        provincePaintSelections.clear();
        if (provincePaintLayer) {
            map.removeLayer(provincePaintLayer);
            provincePaintLayer = null;
        }
        circleImageOverlays.forEach(function (overlay) {
            map.removeLayer(overlay);
        });
        circleImageOverlays.clear();
        drawnItems.clearLayers();
        featureMeta.clear();
        renderFeaturesList();
    }
}



// =====================================================================
//  COORDINATE DISPLAY
// =====================================================================
map.on('mousemove', function (e) {
    const lat  = e.latlng.lat.toFixed(5);
    const lng  = e.latlng.lng.toFixed(5);
    const zoom = map.getZoom();
    const latS = (lat >= 0 ? '+' : '') + lat;
    const lngS = (lng >= 0 ? '+' : '') + lng;
    document.getElementById('coords-display').textContent =
        'LAT: ' + latS + '  |  LNG: ' + lngS + '  |  ZOOM: ' + zoom;
});

map.on('zoomend', function () {
    const el  = document.getElementById('coords-display');
    const txt = el.textContent;
    el.textContent = txt.replace(/ZOOM: \d+/, 'ZOOM: ' + map.getZoom());
});

// =====================================================================
//  POLYGON CLOSE ON FIRST-VERTEX CLICK
//
//  Leaflet.Draw's invisible _mouseMarker intercepts ALL map clicks.
//  We use:
//    - DRAWVERTEX event to reliably read the first vertex latlng from
//      e.layers (the featureGroup of placed vertex markers) — avoids
//      touching internal handler._markers which can vary by version.
//    - A native DOM capture-phase listener on the map container.
//      Capture fires BEFORE any element's bubble handler, so we get
//      the click before the mouseMarker can add a new point.
//    - stopImmediatePropagation  so no other capture handlers run.
//    - getActiveHandler() which finds the enabled handler at call-time.
// =====================================================================
var _captureCloseListener = null;
var _firstVertexLatLng    = null;
var _polyVertexCount      = 0;

function getActiveHandler() {
    try {
        var modes = drawControl._toolbars.draw._modes;
        for (var key in modes) {
            if (modes[key].handler && modes[key].handler._enabled) {
                return modes[key].handler;
            }
        }
    } catch (_e) {}
    return null;
}

function getActiveDrawModeKey() {
    try {
        var modes = drawControl._toolbars.draw._modes;
        for (var key in modes) {
            if (modes[key].handler && modes[key].handler._enabled) {
                return key;
            }
        }
    } catch (_e) {}
    return null;
}

function requiresTripleFinish(modeKey) {
    return modeKey === 'polyline' || modeKey === 'polygon';
}

// Prevent accidental draw completion on double-click and allow triple-click finish.
var _tripleClickTimes = [];
var _tripleClickPts = [];
var _tripleFinishWindowMs = 700;
var _tripleFinishPx = 22;

(function installTripleFinishGuards() {
    var container = map.getContainer();

    container.addEventListener('dblclick', function (ev) {
        var modeKey = getActiveDrawModeKey();
        if (!requiresTripleFinish(modeKey)) return;
        ev.stopImmediatePropagation();
        ev.preventDefault();
    }, true);

    container.addEventListener('click', function (ev) {
        var modeKey = getActiveDrawModeKey();
        if (!requiresTripleFinish(modeKey)) {
            _tripleClickTimes = [];
            _tripleClickPts = [];
            return;
        }

        var now = Date.now();
        var rect = container.getBoundingClientRect();
        var pt = L.point(ev.clientX - rect.left, ev.clientY - rect.top);

        _tripleClickTimes.push(now);
        _tripleClickPts.push(pt);

        // Keep only recent clicks
        while (_tripleClickTimes.length && (now - _tripleClickTimes[0] > _tripleFinishWindowMs)) {
            _tripleClickTimes.shift();
            _tripleClickPts.shift();
        }

        if (_tripleClickTimes.length >= 3) {
            var a = _tripleClickPts[_tripleClickPts.length - 1];
            var b = _tripleClickPts[_tripleClickPts.length - 2];
            var c = _tripleClickPts[_tripleClickPts.length - 3];
            var closeEnough = a.distanceTo(b) <= _tripleFinishPx &&
                              a.distanceTo(c) <= _tripleFinishPx;
            if (closeEnough) {
                ev.stopImmediatePropagation();
                ev.preventDefault();
                var h = getActiveHandler();
                if (h && h._finishShape) h._finishShape();
                _tripleClickTimes = [];
                _tripleClickPts = [];
            }
        }
    }, true);
})();

map.on(L.Draw.Event.DRAWSTART, function (e) {
    if (e.layerType !== 'polygon') return;
    _firstVertexLatLng = null;
    _polyVertexCount   = 0;

    var container = map.getContainer();
    _captureCloseListener = function (ev) {
        if (_polyVertexCount < 3 || !_firstVertexLatLng) return;

        var rect    = container.getBoundingClientRect();
        var clickPt = L.point(ev.clientX - rect.left, ev.clientY - rect.top);
        var firstPt = map.latLngToContainerPoint(_firstVertexLatLng);

        if (firstPt.distanceTo(clickPt) <= 25) {
            ev.stopImmediatePropagation();
            ev.preventDefault();
            var h = getActiveHandler();
            if (h && h._finishShape) h._finishShape();
        }
    };
    container.addEventListener('click', _captureCloseListener, true);
});

map.on(L.Draw.Event.DRAWSTOP, function () {
    if (_captureCloseListener) {
        map.getContainer().removeEventListener('click', _captureCloseListener, true);
        _captureCloseListener = null;
    }
    _firstVertexLatLng = null;
    _polyVertexCount   = 0;
});

// DRAWVERTEX fires after each point is placed.
// e.layers is the FeatureGroup of all placed vertex markers.
map.on(L.Draw.Event.DRAWVERTEX, function (e) {
    var layers = (e.layers ? e.layers.getLayers() : []);
    _polyVertexCount   = layers.length;
    _firstVertexLatLng = layers.length > 0 ? layers[0].getLatLng() : null;

    if (layers.length < 1) return;
    if (layers.length >= 3) {
        // Pulse green: signals "click here to close"
        layers[0].setIcon(L.divIcon({
            className: '',
            html: '<div class="mw-close-dot"></div>',
            iconSize: [14, 14],
            iconAnchor: [7, 7]
        }));
    } else {
        layers[0].setIcon(militaryIcon());
    }
});

// =====================================================================
//  UTC CLOCK
// =====================================================================
function updateClock() {
    const d = new Date();
    const h = String(d.getUTCHours()).padStart(2, '0');
    const m = String(d.getUTCMinutes()).padStart(2, '0');
    const s = String(d.getUTCSeconds()).padStart(2, '0');
    document.getElementById('clock').textContent = h + ':' + m + ':' + s + 'Z';
}
updateClock();
setInterval(updateClock, 1000);

// =====================================================================
//  UTILITY
// =====================================================================
function escapeHTML(str) {
    return str.replace(/&/g,'&amp;')
              .replace(/</g,'&lt;')
              .replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;');
}
